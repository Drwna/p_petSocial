<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宠物百科数据管理</title>
  <!-- 引入 Tailwind CSS 进行快速样式布局 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Vue 3 进行数据绑定 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- 引入 Axios 用于发送请求 -->
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
  <div id="app" class="max-w-7xl mx-auto">
    <!-- 顶部标题与操作栏 -->
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm">
      <h1 class="text-2xl font-bold text-gray-800">🐾 宠物百科数据管理系统</h1>
      <div class="flex gap-4">
        <input v-model="searchQuery" @keyup.enter="searchPets" type="text" placeholder="按名称搜索..." class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:border-blue-500">
        <button @click="searchPets" class="bg-blue-50 text-blue-600 px-4 py-2 rounded hover:bg-blue-100 transition">搜索</button>
        <button @click="openAddModal" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition shadow-sm"> + 添加宠物</button>
      </div>
    </div>

    <!-- 数据列表展示区 -->
    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">图片</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">名称</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">英文名</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">寿命/价格</th>
            <th class="px-6 py-4 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr v-if="pets.length === 0">
            <td colspan="5" class="px-6 py-10 text-center text-gray-500">暂无数据，请添加宠物或修改搜索条件</td>
          </tr>
          <tr v-for="pet in pets" :key="pet._id" class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 whitespace-nowrap">
              <img v-if="pet.pic" :src="pet.pic" alt="pet" class="h-12 w-12 rounded-full object-cover border border-gray-200">
              <div v-else class="h-12 w-12 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 text-xs">无图</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm font-medium text-gray-900">{{ pet.name }}</div>
              <div class="text-sm text-gray-500">{{ pet.nation }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">{{ pet.engname || '-' }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              <div>{{ pet.life || '-' }}</div>
              <div class="text-xs">{{ pet.price || '-' }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button @click="openEditModal(pet)" class="text-indigo-600 hover:text-indigo-900 mr-4">编辑</button>
              <button @click="deletePet(pet._id, pet.name)" class="text-red-600 hover:text-red-900">删除</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 表单弹窗 (Modal) -->
    <div v-if="showModal" class="fixed inset-0 pt-[500px] bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 overflow-y-auto">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-4xl mt-20 mb-10">
        <div class="flex justify-between items-center p-6 border-b border-gray-200">
          <h2 class="text-xl font-bold text-gray-800">{{ isEditing ? '编辑宠物' : '添加新宠物' }}</h2>
          <div class="flex gap-3">
            <button v-if="!isEditing" @click="showJsonImport = !showJsonImport" class="text-sm bg-green-50 text-green-600 px-3 py-1 rounded hover:bg-green-100">
              {{ showJsonImport ? '关闭 JSON 导入' : '通过 JSON 快速导入' }}
            </button>
            <button @click="closeModal" class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none">&times;</button>
          </div>
        </div>

        <!-- JSON 导入区域 -->
        <div v-if="showJsonImport && !isEditing" class="p-6 bg-gray-50 border-b border-gray-200">
          <label class="block text-sm font-medium text-gray-700 mb-2">粘贴 JSON 数据 (支持自动修复格式)</label>
          <textarea v-model="jsonInput" rows="6" placeholder='{ "name": "边境牧羊犬", "engname": "..." }' class="w-full border border-gray-300 rounded px-3 py-2 font-mono text-sm"></textarea>
          <div class="mt-2 flex justify-end">
            <button type="button" @click="parseJsonInput" class="px-4 py-2 bg-green-600 text-white rounded text-sm hover:bg-green-700">解析并填充表单</button>
          </div>
        </div>
        
        <form @submit.prevent="submitForm" class="p-6">
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 基本信息 -->
            <div class="col-span-full mb-2">
              <h3 class="text-lg font-semibold text-gray-700 border-b pb-2">基本信息</h3>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">名称 *</label>
              <input v-model="formData.name" type="text" required class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">英文名称</label>
              <input v-model="formData.engname" type="text" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">原产地</label>
              <input v-model="formData.nation" type="text" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">寿命</label>
              <input v-model="formData.life" type="text" placeholder="例如: 12-15年" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">价格</label>
              <input v-model="formData.price" type="text" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">图片URL</label>
              <input v-model="formData.pic" type="url" placeholder="http://..." class="w-full border border-gray-300 rounded px-3 py-2">
            </div>

            <!-- 属性评分 (1-10或1-5) -->
            <div class="col-span-full mb-2 mt-4">
              <h3 class="text-lg font-semibold text-gray-700 border-b pb-2">属性评分 (数值)</h3>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">粘人程度 (sticky)</label>
              <input v-model.number="formData.sticky" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">叫声程度 (shout)</label>
              <input v-model.number="formData.shout" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">友好程度 (friendly)</label>
              <input v-model.number="formData.friendly" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">掉毛程度 (lint)</label>
              <input v-model.number="formData.lint" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">美容频度 (beauty)</label>
              <input v-model.number="formData.beauty" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">体味程度 (odour)</label>
              <input v-model.number="formData.odour" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">口水程度 (saliva)</label>
              <input v-model.number="formData.saliva" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">运动量 (active)</label>
              <input v-model.number="formData.active" type="number" min="0" max="10" class="w-full border border-gray-300 rounded px-3 py-2">
            </div>

            <!-- 长文本信息 -->
            <div class="col-span-full mb-2 mt-4">
              <h3 class="text-lg font-semibold text-gray-700 border-b pb-2">详细描述</h3>
            </div>
            
            <div class="col-span-full">
              <label class="block text-sm font-medium text-gray-700 mb-1">简介 (message)</label>
              <textarea v-model="formData.message" rows="3" class="w-full border border-gray-300 rounded px-3 py-2"></textarea>
            </div>
            <div class="col-span-full">
              <label class="block text-sm font-medium text-gray-700 mb-1">喂养建议 (feed)</label>
              <textarea v-model="formData.feed" rows="4" class="w-full border border-gray-300 rounded px-3 py-2"></textarea>
            </div>
            <div class="col-span-full">
              <label class="block text-sm font-medium text-gray-700 mb-1">体型特征 (relative)</label>
              <textarea v-model="formData.relative" rows="4" class="w-full border border-gray-300 rounded px-3 py-2"></textarea>
            </div>
            <div class="col-span-full">
              <label class="block text-sm font-medium text-gray-700 mb-1">挑选建议 (pick)</label>
              <textarea v-model="formData.pick" rows="4" class="w-full border border-gray-300 rounded px-3 py-2"></textarea>
            </div>
          </div>
          
          <div class="mt-8 flex justify-end gap-4 border-t border-gray-200 pt-6">
            <button type="button" @click="closeModal" class="px-6 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">取消</button>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 shadow-sm">
              {{ isEditing ? '保存修改' : '确认添加' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const pets = ref([]);
        const searchQuery = ref('');
        const showModal = ref(false);
        const isEditing = ref(false);
        const showJsonImport = ref(false);
        const jsonInput = ref('');
        
        // 表单默认数据
        const defaultForm = {
          name: '', engname: '', nation: '', life: '', price: '', pic: '',
          sticky: 3, shout: 1, friendly: 5, lint: 3, beauty: 2, odour: 2, saliva: 5, active: 1,
          message: '', feed: '', relative: '', pick: ''
        };
        const formData = ref({ ...defaultForm });

        // 获取列表数据
        const fetchPets = async () => {
          try {
            const url = searchQuery.value.trim() 
              ? `/api/pets/search?name=${encodeURIComponent(searchQuery.value)}` 
              : '/api/pets';
            const res = await axios.get(url);
            if (res.data.success) {
              pets.value = res.data.data;
            }
          } catch (error) {
            alert('获取数据失败: ' + (error.response?.data?.message || error.message));
          }
        };

        const searchPets = () => {
          fetchPets();
        };

        // 打开添加弹窗
        const openAddModal = () => {
          isEditing.value = false;
          showJsonImport.value = false;
          jsonInput.value = '';
          formData.value = { ...defaultForm };
          showModal.value = true;
        };

        // 打开编辑弹窗
        const openEditModal = (pet) => {
          isEditing.value = true;
          formData.value = { ...pet }; // 拷贝数据
          showModal.value = true;
        };

        // 关闭弹窗
        const closeModal = () => {
          showModal.value = false;
        };

        // 解析 JSON 输入
        const parseJsonInput = () => {
          if (!jsonInput.value.trim()) return;
          
          try {
            // 尝试修复用户可能粘贴的不完整或带反引号的字符串
            let cleanStr = jsonInput.value.trim();
            
            // 移除可能包裹在外面的大括号之外的内容
            const firstBrace = cleanStr.indexOf('{');
            const lastBrace = cleanStr.lastIndexOf('}');
            if (firstBrace !== -1 && lastBrace !== -1) {
              cleanStr = cleanStr.substring(firstBrace, lastBrace + 1);
            } else if (!cleanStr.startsWith('{')) {
              // 如果用户只粘贴了键值对而没有外层大括号
              cleanStr = `{ ${cleanStr} }`;
            }

            // 处理特殊字符和不规范的格式（例如 pic 字段中的反引号）
            // 移除值的两端可能带有的反引号 (例如: "pic": " `http...` ")
            cleanStr = cleanStr.replace(/"\s*`([^`]*)`\s*"/g, '"$1"');

            // 处理尾部可能多余的逗号
            cleanStr = cleanStr.replace(/,\s*}/g, '}');

            // 解析 JSON
            const parsedData = JSON.parse(cleanStr);
            
            // 合并到 formData，只提取我们需要的字段
            Object.keys(defaultForm).forEach(key => {
              if (parsedData[key] !== undefined) {
                formData.value[key] = parsedData[key];
              }
            });
            
            alert('✅ 解析成功！表单已自动填充。');
            showJsonImport.value = false; // 解析成功后折叠输入框
            jsonInput.value = '';
          } catch (error) {
            console.error('JSON解析错误详情:', error);
            alert(`❌ JSON 格式错误，请检查！\n提示: 请确保所有的键和字符串都使用双引号 ""，并且符合标准 JSON 格式。\n错误信息: ${error.message}`);
          }
        };

        // 提交表单 (新增或修改)
        const submitForm = async () => {
          try {
            if (isEditing.value) {
              // 更新操作
              const { _id, createdAt, updatedAt, __v, ...updateData } = formData.value;
              const res = await axios.put(`/api/pets/${_id}`, updateData);
              if (res.data.success) {
                alert('修改成功！');
              }
            } else {
              // 新增操作
              const res = await axios.post('/api/pets', formData.value);
              if (res.data.success) {
                alert('添加成功！');
              }
            }
            closeModal();
            fetchPets(); // 刷新列表
          } catch (error) {
            alert('操作失败: ' + (error.response?.data?.message || error.message));
          }
        };

        // 删除数据
        const deletePet = async (id, name) => {
          if (!confirm(`确定要删除宠物 "${name}" 吗？此操作不可恢复。`)) return;
          try {
            const res = await axios.delete(`/api/pets/${id}`);
            if (res.data.success) {
              fetchPets(); // 刷新列表
            }
          } catch (error) {
            alert('删除失败: ' + (error.response?.data?.message || error.message));
          }
        };

        // 初始加载
        onMounted(() => {
          fetchPets();
        });

        return {
          pets, searchQuery, showModal, isEditing, formData, showJsonImport, jsonInput,
          fetchPets, searchPets, openAddModal, openEditModal, closeModal, parseJsonInput, submitForm, deletePet
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
